<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script>
    const initialSnapshot = {{ snapshot|tojson }} || {};
    const initialPerformanceData = initialSnapshot.performance_index || [];
    const currencySettings = {{ currency_settings|tojson }};
    const autoRefreshInterval = Math.min(60, Math.max(1, Number({{ config['AUTO_REFRESH_INTERVAL']|default(60) }}) || 60));
    let incomeChart = null;
    let autoRefreshHandle = null;
    let statusHideTimer = null;
    let latestSnapshot = initialSnapshot;
    const holdingsCache = new Map();
    if (window.DashFolioHoldingDetail) {
        window.DashFolioHoldingDetail.configure({
            currencySettings,
            defaultRange: '6M',
        });
    }

    function getThemeColors() {
        const style = getComputedStyle(document.documentElement);
        const primary = style.getPropertyValue('--bs-primary').trim() || '#696cff';
        const success = style.getPropertyValue('--bs-success').trim() || '#71dd37';
        return { primary, success };
    }

    const currencyFormatter = new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: currencySettings.code === 'BHD' ? 'BHD' : 'USD'
    });

    const compactCurrencyFormatter = new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: currencySettings.code === 'BHD' ? 'BHD' : 'USD',
        notation: 'compact',
        maximumFractionDigits: 1,
    });

    function showStatus(message = 'Refreshing data...') {
        const pill = document.getElementById('status-pill');
        const text = document.getElementById('status-text');
        if (!pill || !text) return;
        if (statusHideTimer) {
            clearTimeout(statusHideTimer);
        }
        text.textContent = message;
        pill.style.display = 'inline-flex';
    }

    function hideStatus(delay = 0) {
        const pill = document.getElementById('status-pill');
        if (!pill) return;
        if (statusHideTimer) {
            clearTimeout(statusHideTimer);
        }
        statusHideTimer = setTimeout(() => {
            pill.style.display = 'none';
        }, delay);
    }

    function applyCurrencyConversion(value) {
        const numeric = Number(value);
        if (!Number.isFinite(numeric)) {
            return 0;
        }
        const rate = Number(currencySettings.rate) || 1;
        return numeric * rate;
    }

    function formatCurrency(value) {
        let formatted = currencyFormatter.format(applyCurrencyConversion(value));
        if (currencySettings.code === 'BHD') {
            formatted = formatted.replace('BHD', currencySettings.symbol).replace(/\u00a0/g, '');
        }
        return formatted;
    }

    function formatCompactCurrency(value) {
        let formatted = compactCurrencyFormatter.format(applyCurrencyConversion(value));
        if (currencySettings.code === 'BHD') {
            formatted = formatted.replace('BHD', currencySettings.symbol).replace(/\u00a0/g, '');
        }
        return formatted;
    }

    function formatSignedCurrency(value) {
        const numeric = Number(value);
        if (!Number.isFinite(numeric) || numeric === 0) {
            return formatCurrency(0);
        }
        const absolute = Math.abs(numeric);
        const prefix = numeric > 0 ? '+' : '-';
        return `${prefix}${formatCurrency(absolute)}`;
    }

    function formatPercent(value) {
        if (!isFinite(value)) {
            value = 0;
        }
        const prefix = value > 0 ? '+' : (value < 0 ? '-' : '');
        return `${prefix}${Math.abs(value).toFixed(2)}%`;
    }

    function formatPercentPlain(value) {
        if (!isFinite(value)) {
            value = 0;
        }
        return `${value.toFixed(2)}%`;
    }

    function formatNumber(value, digits = 2) {
        if (!isFinite(value)) {
            value = 0;
        }
        return Number(value).toFixed(digits);
    }

    function formatQuantity(value) {
        return formatNumber(value, 2);
    }

    function isValidNumber(value) {
        if (value === null || value === undefined || value === '') {
            return false;
        }
        const numeric = Number(value);
        return Number.isFinite(numeric);
    }

    function formatCurrencyOrNA(value) {
        if (!isValidNumber(value)) {
            return 'N/A';
        }
        return formatCurrency(Number(value));
    }

    function computeTodayChange(holding) {
        if (!holding) {
            return { value: 0, pct: 0, reason: null };
        }

        const quantity = Number(holding.quantity) || 0;
        const currentPrice = Number(holding.current_price);
        const previousClose = isValidNumber(holding.previous_close)
            ? Number(holding.previous_close)
            : NaN;

        if (quantity === 0) {
            return { value: 0, pct: 0, reason: null };
        }

        if (Number.isFinite(currentPrice) && Number.isFinite(previousClose) && previousClose > 0) {
            const priceDiff = currentPrice - previousClose;
            const value = priceDiff * quantity;
            const pct = previousClose !== 0 ? (priceDiff / previousClose) * 100 : null;
            if (pct === null || !Number.isFinite(pct)) {
                return { value: null, pct: null, reason: 'No prior close available' };
            }
            return { value, pct, reason: null };
        }

        if (isValidNumber(holding.todays_gain) && isValidNumber(holding.todays_gain_pct)) {
            return {
                value: Number(holding.todays_gain),
                pct: Number(holding.todays_gain_pct),
                reason: null,
            };
        }

        return { value: null, pct: null, reason: 'No prior close available' };
    }

    function formatMarketCap(value) {
        if (!isValidNumber(value) || Number(value) <= 0) {
            return 'N/A';
        }
        return formatCurrency(Number(value));
    }

    function formatUpdateTimestamp(isoString) {
        if (!isoString) {
            return 'Updated: Recently';
        }
        const parsed = new Date(isoString);
        if (Number.isNaN(parsed.getTime())) {
            return 'Updated: Recently';
        }

        const now = new Date();
        const diffMs = now.getTime() - parsed.getTime();
        const minuteMs = 60 * 1000;
        const hourMs = 60 * minuteMs;
        const dayMs = 24 * hourMs;

        if (diffMs < minuteMs) {
            return 'Updated: Recently';
        }

        if (diffMs < hourMs) {
            const minutes = Math.max(1, Math.floor(diffMs / minuteMs));
            return `Updated: ${minutes} min ago`;
        }

        if (diffMs < dayMs) {
            const hours = Math.max(1, Math.floor(diffMs / hourMs));
            return `Updated: ${hours} hour${hours === 1 ? '' : 's'} ago`;
        }

        const utcPlusThreeMs = parsed.getTime() + 3 * hourMs;
        const utcPlusThree = new Date(utcPlusThreeMs);
        const datePart = [
            utcPlusThree.getUTCFullYear(),
            String(utcPlusThree.getUTCMonth() + 1).padStart(2, '0'),
            String(utcPlusThree.getUTCDate()).padStart(2, '0'),
        ].join('-');
        const timePart = [
            String(utcPlusThree.getUTCHours()).padStart(2, '0'),
            String(utcPlusThree.getUTCMinutes()).padStart(2, '0'),
            String(utcPlusThree.getUTCSeconds()).padStart(2, '0'),
        ].join(':');

        return `Updated: ${datePart} ${timePart} UTC+3`;
    }

    function destroyIncomeChart() {
        if (incomeChart) {
            incomeChart.destroy();
            incomeChart = null;
        }
    }

    function renderIncomeChart(performanceData) {
        const chartEl = document.getElementById('incomeChart');
        if (!chartEl) {
            return;
        }

        const benchmarkTicker = (latestSnapshot?.benchmark_ticker || initialSnapshot?.benchmark_ticker || '').trim();

        const rawPoints = Array.isArray(performanceData)
            ? performanceData.map(point => ({
                date: point.date,
                cumulative: Number(point.cumulative_return ?? point.cumulative ?? NaN),
                legacyIndex: Number(point.index ?? point.value ?? point.portfolio ?? NaN),
                benchmarkCumulative: Number(point.benchmark_cumulative_return ?? point.benchmark_cumulative ?? NaN),
            }))
            : [];

        let baseIndex = 100;
        const firstLegacy = rawPoints.find(point => Number.isFinite(point.legacyIndex));
        if (firstLegacy && firstLegacy.legacyIndex !== 0 && !Number.isFinite(firstLegacy.cumulative)) {
            baseIndex = Number(firstLegacy.legacyIndex);
        }

        const portfolioPoints = rawPoints
            .map(point => {
                if (!point.date) {
                    return null;
                }
                let ratio = point.cumulative;
                if (!Number.isFinite(ratio) && Number.isFinite(point.legacyIndex)) {
                    const denominator = baseIndex === 0 ? 100 : baseIndex;
                    ratio = (point.legacyIndex - denominator) / denominator;
                }
                if (!Number.isFinite(ratio)) {
                    return null;
                }
                return {
                    x: point.date,
                    y: Number((ratio * 100).toFixed(4)),
                };
            })
            .filter(Boolean);

        const benchmarkPoints = rawPoints
            .map(point => {
                if (!point.date) {
                    return null;
                }
                const ratio = point.benchmarkCumulative;
                if (!Number.isFinite(ratio)) {
                    return null;
                }
                return {
                    x: point.date,
                    y: Number((ratio * 100).toFixed(4)),
                };
            })
            .filter(Boolean);

        if (!portfolioPoints.length) {
            destroyIncomeChart();
            chartEl.innerHTML = '<div class="text-muted text-center py-4">Not enough data to display cumulative performance yet.</div>';
            return;
        }

        const allPoints = benchmarkPoints.length ? portfolioPoints.concat(benchmarkPoints) : portfolioPoints;
        const yValues = allPoints.map(point => point.y);
        let rawMin = 0;
        let rawMax = 0;
        if (yValues.length) {
            rawMin = Math.min(0, ...yValues);
            rawMax = Math.max(0, ...yValues);
        }
        if (Math.abs(rawMax - rawMin) < 1e-6) {
            rawMax = rawMin === 0 ? 2 : rawMin + 2;
        }

        const step = 5;
        const alignDown = value => Math.floor(value / step) * step;
        const alignUp = value => Math.ceil(value / step) * step;

        let yMin = alignDown(rawMin);
        let yMax = alignUp(rawMax);

        if (yMin === yMax) {
            yMax = yMin + step;
        }

        const tickAmount = Math.max(2, Math.min(61, Math.floor((yMax - yMin) / step) + 1));

        const portfolioColor = '#1d4ed8';
        const benchmarkColor = '#94a3b8';

        const series = [
            { name: 'Portfolio return', data: portfolioPoints },
        ];
        if (benchmarkPoints.length) {
            const label = benchmarkTicker ? `${benchmarkTicker} benchmark` : 'Benchmark';
            series.push({ name: label, data: benchmarkPoints });
        }

        const yAxisAnnotations = [];
        if (yMax > 0) {
            yAxisAnnotations.push({
                y: 0,
                y2: yMax,
                fillColor: 'rgba(34, 197, 94, 0.15)',
                opacity: 1,
                borderColor: 'transparent',
            });
        }
        if (yMin < 0) {
            yAxisAnnotations.push({
                y: yMin,
                y2: 0,
                fillColor: 'rgba(239, 68, 68, 0.15)',
                opacity: 1,
                borderColor: 'transparent',
            });
        }
        yAxisAnnotations.push({
            y: 0,
            borderColor: '#0f172a',
            strokeDashArray: 0,
            label: {
                text: '0%',
                style: {
                    background: '#0f172a',
                    color: '#ffffff',
                    fontSize: '12px',
                },
            },
        });

        const options = {
            chart: {
                type: 'line',
                height: 320,
                toolbar: { show: false },
            },
            series,
            colors: series.length > 1 ? [portfolioColor, benchmarkColor] : [portfolioColor],
            dataLabels: { enabled: false },
            stroke: series.length > 1
                ? { curve: 'smooth', width: [3, 2.5] }
                : { curve: 'smooth', width: 3 },
            xaxis: {
                type: 'datetime',
                labels: {
                    format: 'MMM yy',
                },
            },
            yaxis: {
                title: {
                    text: 'Cumulative return',
                },
                tickAmount,
                min: yMin,
                max: yMax,
                labels: {
                    formatter: value => {
                        const numeric = Number(value);
                        return Number.isFinite(numeric) ? `${numeric.toFixed(2)}%` : value;
                    },
                },
            },
            tooltip: {
                shared: series.length > 1,
                x: {
                    format: 'MMM dd, yyyy',
                },
                y: {
                    formatter: value => {
                        const numeric = Number(value);
                        return Number.isFinite(numeric) ? `${numeric.toFixed(2)}%` : value;
                    },
                },
            },
            legend: {
                show: series.length > 1,
                position: 'top',
                horizontalAlign: 'left',
                markers: {
                    width: 12,
                    height: 12,
                    offsetY: 1,
                },
            },
            grid: {
                xaxis: { lines: { show: false } },
                yaxis: { lines: { show: false } },
            },
            annotations: {
                yaxis: yAxisAnnotations,
            },
        };

        if (!incomeChart) {
            chartEl.innerHTML = '';
            incomeChart = new ApexCharts(chartEl, options);
            incomeChart.render();
        } else {
            incomeChart.updateOptions({
                xaxis: options.xaxis,
                yaxis: options.yaxis,
                stroke: options.stroke,
                colors: options.colors,
                tooltip: options.tooltip,
                legend: options.legend,
                grid: options.grid,
                annotations: options.annotations,
            });
            incomeChart.updateSeries(options.series);
        }
    }


    function updateMetrics(snapshot) {
        const summary = snapshot.summary || {};
        const dodValue = summary.dod_value || 0;
        const dodPositive = dodValue >= 0;

        document.getElementById('metric-total-cost').textContent = formatCurrency(summary.total_cost || 0);
        document.getElementById('metric-current-value').textContent = formatCurrency(summary.current_value || 0);

        const totalPlEl = document.getElementById('metric-total-pl');
        if (totalPlEl) {
            const totalPlValue = isValidNumber(summary.total_pl_value)
                ? Number(summary.total_pl_value)
                : (Number(summary.current_value || 0) - Number(summary.total_cost || 0));
            const totalPlPositive = totalPlValue >= 0;
            totalPlEl.textContent = formatSignedCurrency(totalPlValue);
            totalPlEl.classList.toggle('pill-positive', totalPlPositive);
            totalPlEl.classList.toggle('pill-negative', !totalPlPositive);
        }

        const investedEl = document.getElementById('metric-invested-value');
        if (investedEl) {
            investedEl.textContent = `Invested value: ${formatCurrency(summary.invested_value || 0)}`;
        }

        const cashEl = document.getElementById('metric-cash-balance');
        if (cashEl) {
            cashEl.textContent = `Cash balance: ${formatCurrency(summary.cash_balance || 0)}`;
        }

        const realizedPlEl = document.getElementById('metric-realized-pl');
        if (realizedPlEl) {
            const realizedValue = Number(summary.realized_pl_value || 0);
            realizedPlEl.textContent = formatSignedCurrency(realizedValue);
            realizedPlEl.classList.toggle('metric-positive', realizedValue >= 0);
            realizedPlEl.classList.toggle('metric-negative', realizedValue < 0);
        }

        const unrealizedPlEl = document.getElementById('metric-unrealized-pl');
        if (unrealizedPlEl) {
            const unrealizedValue = Number(summary.unrealized_pl_value || 0);
            unrealizedPlEl.textContent = formatSignedCurrency(unrealizedValue);
            unrealizedPlEl.classList.toggle('metric-positive', unrealizedValue >= 0);
            unrealizedPlEl.classList.toggle('metric-negative', unrealizedValue < 0);
        }

        const betaEl = document.getElementById('metric-portfolio-beta');
        if (betaEl) {
            betaEl.textContent = formatNumber(summary.portfolio_beta || 0, 2);
        }

        const varValueEl = document.getElementById('metric-portfolio-var-value');
        if (varValueEl) {
            varValueEl.textContent = formatCurrency(summary.portfolio_var_value || 0);
        }

        const varPctEl = document.getElementById('metric-portfolio-var-pct');
        if (varPctEl) {
            varPctEl.textContent = `VaR (95%): ${formatPercentPlain(summary.portfolio_var_pct || 0)}`;
        }

        const labelEl = document.getElementById('metric-today-label');
        if (labelEl) {
            labelEl.textContent = dodPositive ? 'Todays Profit' : 'Todays Loss';
        }

        const dodValueEl = document.getElementById('metric-dod-value');
        if (dodValueEl) {
            dodValueEl.textContent = formatSignedCurrency(dodValue);
            dodValueEl.classList.toggle('metric-positive', dodPositive);
            dodValueEl.classList.toggle('metric-negative', !dodPositive);
        }

        const dodPctEl = document.getElementById('metric-dod-pct');
        if (dodPctEl) {
            dodPctEl.textContent = formatPercent(summary.dod_pct || 0);
            dodPctEl.classList.toggle('pill-positive', dodPositive);
            dodPctEl.classList.toggle('pill-negative', !dodPositive);
        }

        const topMover = summary.top_mover;
        const topTickerEl = document.getElementById('metric-top-mover-ticker');
        const topChangeEl = document.getElementById('metric-top-mover-change');
        if (topTickerEl && topChangeEl) {
            if (topMover) {
                const moverValue = topMover.change_value || 0;
                const moverPct = topMover.change_pct || 0;
                const moverPositive = moverValue >= 0;

                topTickerEl.textContent = topMover.ticker;
                topTickerEl.classList.remove('text-muted');
                topTickerEl.classList.toggle('metric-positive', moverPositive);
                topTickerEl.classList.toggle('metric-negative', !moverPositive);

                topChangeEl.innerHTML = `
                    <span class="metric-trend-value ${moverPositive ? 'metric-positive' : 'metric-negative'}">${formatSignedCurrency(moverValue)}</span>
                    <span class="metric-trend-pct ${moverPositive ? 'metric-positive' : 'metric-negative'}">(${formatPercent(moverPct)})</span>
                `;
            } else {
                topTickerEl.textContent = 'N/A';
                topTickerEl.classList.add('text-muted');
                topTickerEl.classList.remove('metric-positive', 'metric-negative');
                topChangeEl.textContent = 'No holdings available';
            }
        }

        const updateStatusEl = document.getElementById('update-status');
        if (updateStatusEl) {
            updateStatusEl.textContent = formatUpdateTimestamp(snapshot.generated_at);
        }
    }

    function buildGainCell(value, percent, options = {}) {
        const settings = options || {};
        const placeholder = typeof settings.placeholder === 'string' ? settings.placeholder : '—';
        const tooltip = typeof settings.tooltip === 'string' ? settings.tooltip : '';
        const numericValue = Number(value);
        const numericPercent = Number(percent);
        const hasValue = Number.isFinite(numericValue);
        const hasPercent = Number.isFinite(numericPercent);

        if (!hasValue || !hasPercent) {
            const tooltipAttr = tooltip ? ` title="${tooltip}"` : '';
            return `<span class="d-block text-muted"${tooltipAttr}>${placeholder}</span>`;
        }

        const positive = numericValue >= 0;
        const cls = positive ? 'gain-positive' : 'gain-negative';
        return `<span class="d-block fw-semibold ${cls}">${formatSignedCurrency(numericValue)}</span>` +
            `<small class="text-muted">${formatPercent(numericPercent)}</small>`;
    }

    function updateHoldingsCache(snapshot) {
        holdingsCache.clear();
        const holdings = snapshot && Array.isArray(snapshot.holdings) ? snapshot.holdings : [];
        const normalized = holdings.map(holding => {
            if (!holding || !holding.ticker) {
                return holding;
            }
            const todayChange = computeTodayChange(holding);
            return {
                ...holding,
                todays_gain: todayChange.value,
                todays_gain_pct: todayChange.pct,
                todays_gain_reason: todayChange.reason || null,
            };
        });
        if (window.DashFolioHoldingDetail) {
            window.DashFolioHoldingDetail.setHoldings(normalized);
        }
        normalized.forEach(holding => {
            if (holding && holding.ticker) {
                holdingsCache.set(holding.ticker, holding);
            }
        });
        return normalized;
    }

    function refreshTable(snapshot) {
        const tbody = document.getElementById('holdings-body');
        const kpiBody = document.getElementById('kpi-body');
        const kpiWrapper = document.getElementById('kpi-table-wrapper');
        const kpiEmptyState = document.getElementById('kpi-empty-state');

        if (!tbody) {
            window.location.reload();
            return;
        }

        const holdings = updateHoldingsCache(snapshot);

        if (kpiBody) {
            kpiBody.innerHTML = '';
        }

        if (holdings.length === 0) {
            if (kpiWrapper && kpiEmptyState) {
                kpiWrapper.classList.add('d-none');
                kpiEmptyState.classList.remove('d-none');
            }
            window.location.reload();
            return;
        }

        if (kpiWrapper && kpiEmptyState) {
            kpiWrapper.classList.remove('d-none');
            kpiEmptyState.classList.add('d-none');
        }

        tbody.innerHTML = '';
        holdings.forEach(holding => {
            if (!holding) {
                return;
            }
            const row = document.createElement('tr');
            row.dataset.ticker = holding.ticker;
            row.classList.add('holding-detail-trigger');
            const logoSrc = holding.logo_url || 'https://via.placeholder.com/42?text=%20';
            row.innerHTML = `
                <td class="logo-cell"><img src="${logoSrc}" alt="${holding.ticker} logo" onerror="this.src='https://via.placeholder.com/42?text=%20';"></td>
                <td class="fw-semibold ticker-col">${holding.ticker}</td>
                <td class="numeric-col"><span class="fw-semibold">${formatQuantity(holding.quantity)}</span></td>
                <td class="numeric-col">${formatCurrency(holding.average_cost)}</td>
                <td class="current-price numeric-col">${formatCurrency(holding.current_price)}</td>
                <td class="numeric-col">${formatCurrency(holding.total_cost)}</td>
                <td class="current-value numeric-col">${formatCurrency(holding.current_value)}</td>
                <td class="todays-gain compact-col">${buildGainCell(holding.todays_gain, holding.todays_gain_pct, {
                    tooltip: holding.todays_gain_reason ? String(holding.todays_gain_reason) : ''
                })}</td>
                <td class="compact-col">${buildGainCell(holding.weekly_gain, holding.weekly_gain_pct)}</td>
                <td class="compact-col">${buildGainCell(holding.monthly_gain, holding.monthly_gain_pct)}</td>
                <td class="compact-col">${buildGainCell(holding.pl_value, holding.pl_pct)}</td>
                <td class="compact-col"><span class="allocation-pill">${formatNumber(holding.allocation_pct || 0)}%</span></td>
            `;
            tbody.appendChild(row);

            if (kpiBody) {
                const kpiRow = document.createElement('tr');
                kpiRow.dataset.ticker = holding.ticker;
                kpiRow.classList.add('holding-detail-trigger');
                kpiRow.innerHTML = `
                    <td class="logo-cell"><img src="${logoSrc}" alt="${holding.ticker} logo" onerror="this.src='https://via.placeholder.com/42?text=%20';"></td>
                    <td class="fw-semibold">${holding.ticker}</td>
                    <td><span class="fw-semibold">${formatPercentPlain(holding.volatility_pct || 0)}</span></td>
                    <td><span class="fw-semibold">${formatNumber(holding.sharpe_ratio || 0)}</span></td>
                    <td><span class="fw-semibold">${formatPercentPlain(holding.max_drawdown_pct || 0)}</span></td>
                    <td><span class="fw-semibold">${formatNumber(holding.beta_vs_benchmark || 0)}</span></td>
                    <td><span class="fw-semibold">${formatPercentPlain(holding.ewma_var_pct || 0)}</span></td>
                    <td><span class="fw-semibold">${formatPercentPlain(holding.yield_on_cost_pct || 0)}</span></td>
                `;
                kpiBody.appendChild(kpiRow);
            }
        });
    }

    async function fetchSnapshot({ force = false, showStatusPill = false } = {}) {
        const refreshButton = document.getElementById('portfolio-refresh-btn');
        if (showStatusPill) {
            showStatus('Refreshing data...');
            if (refreshButton) {
                refreshButton.disabled = true;
            }
        }
        try {
            const url = new URL('{{ url_for('api_get_portfolio') }}', window.location.origin);
            if (force) {
                url.searchParams.set('force', '1');
            }
            const response = await fetch(url, { cache: 'no-cache' });
            if (!response.ok) throw new Error('Request failed');
            const snapshot = await response.json();
            latestSnapshot = snapshot;
            updateMetrics(snapshot);
            refreshTable(snapshot);
            renderIncomeChart(snapshot.performance_index || []);
        } catch (err) {
            console.error('Failed to refresh portfolio snapshot', err);
        } finally {
            if (showStatusPill) {
                hideStatus(400);
                if (refreshButton) {
                    refreshButton.disabled = false;
                }
            }
        }
    }

    function scheduleAutoRefresh() {
        if (autoRefreshHandle) {
            clearInterval(autoRefreshHandle);
        }
        if (autoRefreshInterval && autoRefreshInterval >= 1) {
            autoRefreshHandle = setInterval(() => {
                fetchSnapshot({ force: true });
            }, autoRefreshInterval * 1000);
        }
    }

    updateHoldingsCache(initialSnapshot);

    const holdingsCard = document.getElementById('holdings-card');
    if (holdingsCard) {
        holdingsCard.addEventListener('click', event => {
            const target = event.target;
            if (!target) {
                return;
            }
            const row = target.closest('tr[data-ticker]');
            if (!row) {
                return;
            }
            const ticker = row.dataset.ticker;
            if (!ticker || !window.DashFolioHoldingDetail) {
                return;
            }
            const holding = holdingsCache.get(ticker);
            if (holding) {
                window.DashFolioHoldingDetail.openHolding(holding);
            } else {
                window.DashFolioHoldingDetail.openByTicker(ticker);
            }
        });
    }

    const kpiCard = document.getElementById('portfolio-kpi-card');
    if (kpiCard) {
        kpiCard.addEventListener('click', event => {
            const target = event.target;
            if (!target) {
                return;
            }
            const row = target.closest('tr[data-ticker]');
            if (!row) {
                return;
            }
            const ticker = row.dataset.ticker;
            if (!ticker || !window.DashFolioHoldingDetail) {
                return;
            }
            const holding = holdingsCache.get(ticker);
            if (holding) {
                window.DashFolioHoldingDetail.openHolding(holding);
            } else {
                window.DashFolioHoldingDetail.openByTicker(ticker);
            }
        });
    }

    const manualRefreshButton = document.getElementById('portfolio-refresh-btn');
    if (manualRefreshButton) {
        manualRefreshButton.addEventListener('click', () => {
            fetchSnapshot({ force: true, showStatusPill: true });
        });
    }

    renderIncomeChart(initialPerformanceData);
    fetchSnapshot({ force: true });
    scheduleAutoRefresh();
</script>
