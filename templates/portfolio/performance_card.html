<div class="card mb-4" id="performance-card">
    <div class="card-header d-flex flex-wrap justify-content-between align-items-center gap-2">
        <div>
            <h5 class="mb-1">Performance</h5>
            <small class="text-muted">Time-weighted index for invested assets, excluding cash and external flows.</small>
        </div>
        <div class="dropdown">
            <button class="btn btn-sm btn-outline-primary dropdown-toggle" type="button" id="performance-range-button" data-bs-toggle="dropdown" aria-expanded="false">
                YTD
            </button>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="performance-range-button">
                <li><button class="dropdown-item active" type="button" data-performance-range="ytd">YTD</button></li>
                <li><button class="dropdown-item" type="button" data-performance-range="1y">1 Year</button></li>
                <li><button class="dropdown-item" type="button" data-performance-range="6m">6 Months</button></li>
                <li><button class="dropdown-item" type="button" data-performance-range="3m">3 Months</button></li>
                <li><button class="dropdown-item" type="button" data-performance-range="1w">1 Week</button></li>
            </ul>
        </div>
    </div>
    <div class="card-body">
        <div class="row g-4 align-items-stretch">
            <div class="col-12 col-xl-8">
                <div id="incomeChart" class="performance-chart h-100"></div>
            </div>
            <div class="col-12 col-xl-4">
                <div class="performance-gauge-tile h-100 d-flex flex-column">
                    <div class="d-flex align-items-start justify-content-between mb-3">
                        <div>
                            <small class="text-muted text-uppercase fw-semibold d-block">Performance</small>
                            <h5 class="mb-0">Growth overview</h5>
                        </div>
                    </div>
                    <div class="performance-gauge-chart flex-grow-1 d-flex align-items-center justify-content-center">
                        <div id="performanceGauge"></div>
                    </div>
                    <div class="text-center mt-3">
                        <div class="text-muted small" id="performance-range-note">Select a range to view growth.</div>
                        <div class="fw-semibold" id="performance-benchmark">Benchmark change N/A</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
