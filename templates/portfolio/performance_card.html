<div class="card mb-4" id="performance-card">
    <div class="card-header d-flex flex-wrap justify-content-between align-items-center gap-2">
        <div>
            <h5 class="mb-1">Performance</h5>
            <small class="text-muted">Time-weighted index for invested assets, excluding cash and external flows.</small>
        </div>
    </div>
    <div class="card-body">
        <div class="row g-4 align-items-stretch">
            <div class="col-12 col-xl-8">
                <div id="incomeChart" style="min-height: 320px;"></div>
            </div>
            <div class="col-12 col-xl-4">
                <div class="performance-gauge-tile h-100 d-flex flex-column">
                    <div class="d-flex align-items-start justify-content-between mb-3">
                        <div>
                            <small class="text-muted text-uppercase fw-semibold d-block">Performance</small>
                            <h5 class="mb-0">Growth overview</h5>
                        </div>
                        <div class="dropdown">
                            <button class="btn btn-sm btn-outline-primary dropdown-toggle" type="button" id="performance-gauge-year" data-bs-toggle="dropdown" aria-expanded="false">
                                2024
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="performance-gauge-year">
                                <li><button class="dropdown-item active" type="button" data-range="ytd">Year to date</button></li>
                                <li><button class="dropdown-item" type="button" data-range="1y">Last 12 months</button></li>
                                <li><button class="dropdown-item" type="button" data-range="max">Max available</button></li>
                            </ul>
                        </div>
                    </div>
                    <div class="performance-gauge-chart flex-grow-1 d-flex align-items-center justify-content-center">
                        <div id="performanceGauge"></div>
                    </div>
                    <div class="text-center mt-3">
                        <div class="fw-semibold" id="performance-gauge-summary">Company growth unavailable</div>
                        <div class="text-muted small" id="performance-benchmark">Benchmark performance N/A</div>
                    </div>
                    <div class="row g-4 mt-4 performance-gauge-stats">
                        <div class="col-12 col-sm-6">
                            <div class="d-flex align-items-center gap-3">
                                <span class="performance-gauge-icon performance-gauge-icon-primary">
                                    <i class="bx bx-trending-up"></i>
                                </span>
                                <div>
                                    <small class="text-muted d-block" id="performance-portfolio-year">2024</small>
                                    <div class="fw-semibold" id="performance-portfolio-value">--</div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="d-flex align-items-center gap-3">
                                <span class="performance-gauge-icon performance-gauge-icon-info">
                                    <i class="bx bx-line-chart"></i>
                                </span>
                                <div>
                                    <small class="text-muted d-block" id="performance-benchmark-year">2023</small>
                                    <div class="fw-semibold" id="performance-benchmark-value">--</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
